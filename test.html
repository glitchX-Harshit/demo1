<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allemande Clinic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CSS RESET & GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        }

        :root {
            --hero-height: calc(100vh - 70px);
            --border-color: #cccccc; /* Used for the grid lines in the treatments section */
        }

        body {
            background-color: #ffffff;
            color: #333333;
            overflow-x: hidden;
        }

        /* --- NAVIGATION BAR --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 70px;
            background-color: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-left { gap: 30px; }

        .logo {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: -0.5px;
            color: #2b2b2b;
        }

        .btn-book {
            text-decoration: none;
            color: #2b2b2b;
            border: 1px solid #2b2b2b;
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-book:hover {
            background-color: #2b2b2b;
            color: #ffffff;
        }

        .nav-right { gap: 25px; }

        .nav-link {
            text-decoration: none;
            color: #2b2b2b;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .cart-count {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            font-size: 9px;
            color: white;
            font-weight: bold;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 10px;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 1px;
            background-color: #2b2b2b;
        }

        /* --- SPLIT BACKGROUND WRAPPER --- */
        .image-wrapper {
            margin-top: 70px; 
            width: 100%;
            height: calc(var(--hero-height) * 1.6); 
            
            background-image: url('assets/1.png'); 
            background-size: 100% 100%; 
            background-position: top center;
            background-repeat: no-repeat;
            
            position: relative; 
        }

        /* --- GRID OVERLAY BLOCKS --- */
        .grid-block {
            position: absolute;
            background-color: #ffffff;
            z-index: 10;
        }

        .block-main {
            top: 25%; 
            left: 0%; 
            width: 40%; 
            height: 25%; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .block-main h1 {
            font-size: clamp(3rem, 5vw, 6rem); 
            line-height: 0.95;
            font-weight: 400;
            letter-spacing: -3px;
            color: #333333;
            margin-bottom: 25px;
        }

        .block-main p {
            font-size: clamp(1rem, 1.5vw, 1.5rem);
            color: #4a4a4a;
            font-weight: 300;
            letter-spacing: -0.2px;
        }

        /* Action Blocks Base Styles */
        .action-block {
            padding: clamp(15px, 2vw, 30px);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .action-block:hover {
            background-color: #f9f9f9;
        }

        .action-text {
            font-size: clamp(12px, 1.2vw, 16px);
            text-transform: uppercase;
            color: #1a365d; 
            font-weight: 300;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .lucide-arrow {
            width: clamp(24px, 2.5vw, 36px);
            height: auto;
            stroke: #333;
            transition: transform 0.3s ease;
        }

        .action-block:hover .lucide-arrow {
            transform: translate(3px, -3px);
        }

        .block-explore {
            top: 50%; 
            left: 60%; 
            width: 20%; 
            height: 25%; 
        }

        .block-book {
            top: 75%; 
            left: 0%; 
            width: 20%; 
            height: 25%; 
        }

        /* =========================================
           --- SIGNATURE TREATMENTS SECTION ---
           ========================================= */
        
        .treatments-section {
            padding: 80px 40px;
            background-color: #ffffff;
        }

        .treatments-header {
            margin-bottom: 40px;
        }

        .treatments-header h2 {
            font-size: clamp(2.5rem, 4vw, 4.5rem);
            font-weight: 300;
            letter-spacing: -2px;
            color: #4a4a4a;
            margin-bottom: 10px;
        }

        .treatments-header p {
            font-size: 1rem;
            color: #666666;
            font-weight: 300;
        }

        /* 5-Column Grid Setup */
        .treatments-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-auto-rows: calc((100vw - 80px) / 5); 
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            gap: 1px;
        }

        .t-cell {
            background-color: #ffffff; 
            position: relative;
            overflow: hidden;
        }

        /* Top 3 White Text Boxes */
        .t-text-box {
            padding: clamp(15px, 2vw, 25px);
            font-size: clamp(1.1rem, 1.5vw, 1.6rem);
            color: #333;
            font-weight: 300;
            line-height: 1.2;
        }

        /* Image Cells */
        .t-img {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Dark Action Box */
        .t-dark-box {
            background-color: #3a3a3a;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(15px, 2vw, 30px);
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .t-dark-box:hover {
            background-color: #2b2b2b;
        }

        .t-dark-box span {
            font-size: clamp(10px, 1vw, 14px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .t-dark-box .lucide-arrow {
            stroke: #ffffff; 
        }

        /* Grid Placements */
        .cell-injectables { grid-column: 1 / 2; grid-row: 1 / 2; }
        .cell-laser { grid-column: 2 / 3; grid-row: 1 / 2; }
        .cell-body { grid-column: 3 / 4; grid-row: 1 / 2; }
        .cell-small-img { grid-column: 1 / 2; grid-row: 2 / 3; }
        .cell-explore { grid-column: 2 / 4; grid-row: 2 / 3; }
        .cell-large-img { grid-column: 4 / 6; grid-row: 1 / 3; }

        /* =========================================
           --- NEW: TRUSTED BY PATIENTS SECTION ---
           ========================================= */

        .trusted-section {
            height: 110vh; /* As requested */
            width: 100%;
            background-image: url('https://static.wixstatic.com/media/c837a6_b39675ad14fa467cb5745f6670c2384af000.jpg/v1/fill/w_1604,h_951,fp_0.50_0.50,q_85,enc_auto/c837a6_b39675ad14fa467cb5745f6670c2384af000.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 80px 40px; /* Matching the overall site padding */
            display: flex;
            align-items: flex-start; /* Aligns content to the top */
        }

        .trusted-content h2 {
            font-size: clamp(3rem, 5vw, 5.5rem);
            line-height: 0.95;
            font-weight: 400;
            letter-spacing: -3px;
            color: #333333;
        }


        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 900px) {
            .block-main { width: 60%; }
            .block-explore { left: 60%; width: 40%; }
            .block-book { top: 75%; width: 40%; }

            /* Treatments Responsive */
            .treatments-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: minmax(200px, auto);
            }
            .cell-injectables, .cell-laser, .cell-body, .cell-small-img, .cell-explore, .cell-large-img {
                grid-column: span 1;
                grid-row: span 1;
            }
            .cell-explore { grid-column: 1 / 3; } 
            .cell-large-img { grid-column: 1 / 3; grid-row: auto; min-height: 400px; }
        }

        @media (max-width: 600px) {
            .navbar { padding: 0 20px; }
            .nav-left { gap: 15px; }
            .block-main { width: 100%; padding: 30px 20px; }
            .block-main h1 { letter-spacing: -1px; }
            .block-explore, .block-book { width: 50%; }
            .block-explore { left: 50%; }

            /* Treatments Responsive */
            .treatments-section { padding: 60px 20px; }
            .treatments-grid { grid-template-columns: 1fr; }
            .cell-explore, .cell-large-img { grid-column: 1 / 2; }

            /* Trusted Section Responsive */
            .trusted-section { padding: 60px 20px; }
            .trusted-content h2 { letter-spacing: -1px; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="logo">(A)</div>
            <a href="#" class="btn-book">BOOK NOW</a>
        </div>
        
        <div class="nav-right">
            <a href="#" class="nav-link">
                <i class="fa-solid fa-circle-user" style="font-size: 18px;"></i> Log In
            </a>
            <a href="#" class="nav-link cart-icon">
                <i class="fa-solid fa-bag-shopping" style="font-size: 20px;"></i>
                <span class="cart-count">0</span>
            </a>
            <button class="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="image-wrapper">
        
        <div class="grid-block block-main">
            <h1>Allemande<br>Clinic</h1>
            <p>Advanced Aesthetics, Naturally You</p>
        </div>

        <a href="#" class="grid-block action-block block-explore">
            <div class="action-text">Explore<br>Treatments</div>
            <svg class="lucide-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
            </svg>
        </a>

        <a href="#" class="grid-block action-block block-book">
            <div class="action-text">Book A<br>Consultation</div>
            <svg class="lucide-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
            </svg>
        </a>

    </main>

    <section class="treatments-section">
        <div class="treatments-header">
            <h2>Our Signature Treatments</h2>
            <p>Tailored to Your Unique Beauty</p>
        </div>

        <div class="treatments-grid">
            <div class="t-cell t-text-box cell-injectables">
                Injectables &<br>Fillers
            </div>
            <div class="t-cell t-text-box cell-laser">
                Laser & Skin<br>Rejuvenation
            </div>
            <div class="t-cell t-text-box cell-body">
                Body<br>Contouring
            </div>

            <div class="t-cell t-img cell-large-img" style="background-image: url('assets/2.png');"></div>

            <div class="t-cell t-img cell-small-img" style="background-image: url('assets/3.png');"></div>
            
            <a href="#" class="t-cell t-dark-box cell-explore">
                <span>EXPLORE ALL<br>TREATMENTS</span>
                <svg class="lucide-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
            </a>
        </div>
    </section>

    <section class="trusted-section">
        <div class="trusted-content">
            <h2>Trusted by Our<br>Patients</h2>
        </div>
    </section>

    <script>
        const hamburger = document.querySelector('.hamburger');
        hamburger.addEventListener('click', () => {
            console.log('Menu toggled');
        });
    </script>
</body>
</html>
